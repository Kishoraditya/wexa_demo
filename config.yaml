# ============================================================
# Enterprise RAG Assistant — Master Configuration
# All tunable parameters live here. No hardcoded values in code.
# Change this file to reconfigure the system without code changes.
# ============================================================

app:
  name: "Enterprise Cloud Architecture Assistant"
  version: "1.0.0"
  environment: "development"          # development | staging | production
  log_level: "INFO"                   # DEBUG | INFO | WARNING | ERROR

# ------------------------------------------------------------
# Document Ingestion
# ------------------------------------------------------------
ingestion:
  data_dir: "data/pdfs"
  supported_formats: ["pdf", "md", "txt"]
  
  chunking:
    chunk_size: 512                   # tokens per chunk
                                      # 512 chosen as empirical sweet spot:
                                      # large enough for multi-sentence context,
                                      # small enough for precise embedding signal.
                                      # Tune down to 256 for factual lookup tasks,
                                      # up to 1024 for summarization tasks.
    chunk_overlap: 50                 # token overlap between adjacent chunks
                                      # prevents context loss at chunk boundaries
    separators: ["\n\n", "\n", " "]   # priority order for split points
  
  deduplication:
    enabled: true                     # skip re-embedding identical chunks on re-ingest
    hash_algorithm: "sha256"

# ------------------------------------------------------------
# Embedding
# ------------------------------------------------------------
embedding:
  model: "BAAI/bge-small-en-v1.5"     # Local HuggingFace embedding model
                                      # 384 dimensions, free, CPU-friendly
                                      # NDCG@10 = 51.68 on BEIR benchmark
  dimensions: 384
  batch_size: 100                     # chunks per embedding call
  cache_enabled: true                 # cache embeddings by chunk hash
  cache_dir: ".cache/embeddings"

# ------------------------------------------------------------
# Vector Store
# ------------------------------------------------------------
vector_store:
  provider: "faiss"                   # faiss | pinecone | weaviate | qdrant
                                      # swappable via VectorStoreService interface
  index_name: "aws-well-architected"
  index_dir: "data/faiss_index"       # directory for persisted FAISS index
  
  retrieval:
    top_k: 5                          # number of chunks to retrieve
                                      # 5 balances context richness vs prompt length.
                                      # Increase to 8-10 for complex multi-hop questions.
    score_threshold: 0.70             # minimum cosine similarity to include a chunk
                                      # 0.70 calibrated on AWS domain vocabulary.
                                      # Lower to 0.60 if recall is too low.
    search_type: "similarity"         # similarity | mmr (mmr adds diversity)

# ------------------------------------------------------------
# Reranker
# ------------------------------------------------------------
reranker:
  enabled: false                       # toggle off in latency-sensitive deployments
  model: "BAAI/bge-reranker-base"     # cross-encoder, considers query-doc jointly
  top_n: 5                            # rerank top-n candidates from retriever

# ------------------------------------------------------------
# Generation
# ------------------------------------------------------------
generation:
  temperature: 0.1                    # low temperature for factual, grounded answers
                                      # 0.0 is fully deterministic but repetitive.
                                      # 0.1 adds minimal variation while staying grounded.
  max_new_tokens: 512                 # maximum tokens in generated response
  timeout_seconds: 120                 # abort generation if exceeds this threshold

# ------------------------------------------------------------
# Model Routing
# ------------------------------------------------------------
models:
  primary:
    type: "huggingface_peft"
    base_model: "microsoft/Phi-3-mini-4k-instruct"
    adapter_repo: "kishoraditya/enterprise-rag-adapter"                  # set to HF Hub path after fine-tuning
                                      # e.g. "your-username/phi3-mini-aws-qlora"
    load_in_4bit: false                # QLoRA 4-bit NF4 quantization
    device: "auto"                    # auto | cpu | cuda
  
  fallback:
    type: "openai"
    model: "gpt-4o-mini"
    max_tokens: 512
    temperature: 0.1
                                      # fallback activates when:
                                      # - primary model fails to load
                                      # - GPU unavailable
                                      # - generation timeout exceeded
                                      # - HF Hub unreachable

# ------------------------------------------------------------
# Fine Tuning Parameters
# ------------------------------------------------------------
fine_tuning_params:            # Kept here for transparency/reproducibility
  lora_rank: 16                # Sweet spot for task-specific adaptation
  lora_alpha: 32               # Standard scaling factor (2x rank)
  learning_rate: 2e-4
  epochs: 1

# ------------------------------------------------------------
# Guardrails
# ------------------------------------------------------------
guardrails:
  input:
    max_query_length: 1000            # characters, returns 422 if exceeded
    injection_detection: true         # detect "ignore previous instructions" patterns
  
  output:
    grounding_check: true             # semantic similarity check on generated answer
    grounding_threshold: 0.50         # flag as low-confidence if below this
    pii_redaction: true               # scan and redact email, phone, SSN patterns

# ------------------------------------------------------------
# Caching
# ------------------------------------------------------------
cache:
  enabled: true
  backend: "diskcache"                # diskcache (local) | redis (production)
  cache_dir: ".cache/responses"
  ttl_seconds: 3600                   # 1 hour TTL — docs update infrequently

# ------------------------------------------------------------
# Observability
# ------------------------------------------------------------
observability:
  logging:
    format: "json"                    # json | text
    sink: "logs/app.log"
    rotation: "100 MB"
    retention: "7 days"
  
  metrics:
    enabled: true
    endpoint: "/metrics"              # Prometheus scrape endpoint

# ------------------------------------------------------------
# API
# ------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  workers: 1                          # increase in production
  cors_origins: ["http://localhost:8501"]   # Streamlit default port

# ------------------------------------------------------------
# Evaluation
# ------------------------------------------------------------
evaluation:
  gold_dataset_path: "eval/gold_dataset.json"
  ragas:
    faithfulness_threshold: 0.75
    context_precision_threshold: 0.70
  latency_benchmarks:
    retrieval_p95_ms: 200
    generation_p95_ms: 5000
    end_to_end_p95_ms: 7000
    